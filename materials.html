<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Descarga juegos y hojas de trabajo para dinamizar tus clases." >
    <title>Materiales Didácticos | Zapato Didáctico</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header (coherente con el diseño) -->
    <header class="header">
        <div class="container header-flex">
            <a href="index.html">
                <img src="assets/images/logo.png" alt="Logo Zapato Didáctico" class="header-logo">
            </a>
            
            <!-- Ejemplo para index.html y demás -->
            <nav class="navbar">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="about.html">Sobre Nosotros</a></li>
                    <li><a href="materials.html">Materiales</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="contact.html">Contacto</a></li>
                </ul>
            </nav>

            <button class="menu-toggle" aria-expanded="false" aria-label="Menú móvil">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- Hero Section Específica -->
    <section class="hero hero-materials">
        <div class="container">
            <div class="hero-content">
                <h1>Explora Nuestros Materiales</h1>
                <p class="subtitle">Descarga recursos listos para usar en tus clases</p>
            </div>
        </div>
    </section>

    <!-- Filtros de Categorías -->
    <section class="materials-filters">
        <div class="container">
            <div class="filter-buttons">
                <button class="filter-btn active" data-category="all">Todos</button>
                <button class="filter-btn" data-category="juegos">Juegos</button>
                <button class="filter-btn" data-category="expansiones">Expansiones</button>
                <button class="filter-btn" data-category="hojas-trabajo">Hojas de Trabajo</button>
            </div>
            
            <!-- Buscador (opcional) -->
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Buscar material...">
                <button id="search-btn" type="button" title="Buscar"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </section>

    <!-- Contenedor de Materiales (se llena con JS) -->
    <section class="materials-catalog">
        <div class="container">
            <div class="materials-grid" id="materials-container">
                <!-- Los materiales se cargarán aquí dinámicamente -->
                <div class="loading-spinner">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <p>Cargando materiales...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer (igual al index) -->
    <footer class="footer">
        <div class="container">
            <!-- ... Mismo footer que index.html ... -->
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/materials.js"></script>
</body>
</html>
